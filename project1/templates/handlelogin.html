{% extends 'base.html' %}
{% block title %}Login{% endblock title %}

{% block page_title %}
<span class="auth-title">Login</span>
{% endblock page_title %}

{% block content %}
<style>
  .auth-title {
    font-size: 2.5rem; /* Larger than default, smaller than display-4 */
    font-weight: 600;
  }
</style>
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <h2 class="card-title text-center mb-4">Welcome Back!</h2>

                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endfor %}

                    <form action="{% url 'handlelogin' %}" method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label for="usernumber" class="form-label">Phone Number</label>
                            <input type="text" class="form-control" id="usernumber" name="usernumber" placeholder="Enter your phone number" required>
                        </div>
                        <div class="mb-4">
                            <label for="pass1" class="form-label">Password</label>
                            <input type="password" class="form-control" id="pass1" name="pass1" placeholder="Enter your password" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning btn-block">Login</button>
                        </div>
                    </form>
                    <div class="text-center mt-4">
                        <p>Don't have an account? <a href="{% url 'signup' %}">Sign Up</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
