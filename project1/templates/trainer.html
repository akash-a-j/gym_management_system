{% extends 'base.html' %}
{% block title %}
Trainer
{% endblock title %}
{% block content %}

<div class="container mt-2">
  <Center>
    <h1>Trainers</h1>
  </Center>
  <div class="row">


    {% for post in posts %}
    <div class="col-md-4">


      <div class="card">
        <img src="{{post.img.url}}" class="card-img-top" alt="...">
        <div class="card-body">
          <h5 class="card-title">{{post.name}}</h5>
          <p class="card-text"> <b>{{post.gender}} </b></p>
        </div>
      </div>


    </div>
    {% endfor %}
    <br>
    <br>

  </div>
</div>

{% endblock content %}
