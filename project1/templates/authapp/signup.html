{% extends 'base.html' %}
{% load static %}

{% block content %}
<main id="main">
  <section id="signup" class="signup">
    <div class="container" data-aos="fade-up">
      <div class="section-title">
        <h2>Sign Up</h2>
        <p>Create a new account</p>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-8">
          {% if messages %}
          {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
          {% endfor %}
          {% endif %}

          <form method="post" class="php-email-form">
            {% csrf_token %}
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="usernumber" class="form-label">Phone Number</label>
                <input type="text" class="form-control" id="usernumber" name="usernumber"
                  placeholder="Enter 10-digit phone number" pattern="[0-9]{10}" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="pass1" class="form-label">Password</label>
                <input type="password" class="form-control" id="pass1" name="pass1" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="pass2" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="pass2" name="pass2" required>
              </div>
            </div>
            <div class="text-center">
              <button type="submit" class="btn-get-started">Sign Up</button>
            </div>
          </form>
          <div class="text-center mt-3">
            <p>Already have an account? <a href="{% url 'handlelogin' %}">Login here</a></p>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
{% endblock %}
