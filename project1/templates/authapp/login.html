{% extends 'base.html' %}
{% load static %}

{% block content %}
<main id="main">
  <section id="login" class="login">
    <div class="container" data-aos="fade-up">
      <div class="section-title">
        <h2>Login</h2>
        <p>Login to your account</p>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-6">
          {% if messages %}
          {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
          {% endfor %}
          {% endif %}

          <form method="post" class="php-email-form">
            {% csrf_token %}
            <div class="mb-3">
              <label for="usernumber" class="form-label">Phone Number</label>
              <input type="text" class="form-control" id="usernumber" name="usernumber"
                placeholder="Enter 10-digit phone number" pattern="[0-9]{10}" required>
            </div>
            <div class="mb-3">
              <label for="pass1" class="form-label">Password</label>
              <input type="password" class="form-control" id="pass1" name="pass1" required>
            </div>
            <div class="text-center">
              <button type="submit" class="btn-get-started">Login</button>
            </div>
          </form>
          <div class="text-center mt-3">
            <p>Don't have an account? <a href="{% url 'signup' %}">Sign up here</a></p>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
{% endblock %}
